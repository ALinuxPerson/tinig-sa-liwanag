<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tinig sa Liwanag - Hiligaynon Translation Demo</title>
<style>
  :root { --accent:#1a73e8; --bg:#f5f6f8; --card:#fff; --line:#dadce0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
         background:var(--bg); color:#202124; }
  header { padding:18px 24px; background:var(--card); border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:20px; font-weight:600; }
  header span { color:#5f6368; font-size:13px; }
  .wrap { max-width:1000px; margin:24px auto; padding:0 16px; }
  .panes { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:700px){ .panes{ grid-template-columns:1fr; } }
  .pane { background:var(--card); border:1px solid var(--line); border-radius:12px;
          padding:14px; min-height:240px; display:flex; flex-direction:column; }
  .pane label { font-size:12px; font-weight:600; color:#5f6368; text-transform:uppercase;
                letter-spacing:.04em; margin-bottom:8px; }
  textarea { flex:1; border:none; resize:none; font-size:18px; line-height:1.5;
             outline:none; font-family:inherit; background:transparent; }
  #out { flex:1; font-size:18px; line-height:1.5; white-space:pre-wrap; color:#202124; }
  #out .ph { color:#9aa0a6; }
  .bar { max-width:1000px; margin:16px auto 0; padding:0 16px; display:flex;
         gap:12px; align-items:center; flex-wrap:wrap; }
  button { background:var(--accent); color:#fff; border:none; border-radius:8px;
           padding:10px 22px; font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .hint { color:#5f6368; font-size:13px; }
  .star { color:#9aa0a6; }
  .samples { max-width:1000px; margin:18px auto 0; padding:0 16px; display:grid;
             grid-template-columns:repeat(3,1fr); gap:10px; }
  @media (max-width:800px){ .samples{ grid-template-columns:1fr; } }
  .sample { background:#fff; color:#202124; border:1px solid var(--line); border-radius:8px;
            padding:10px 12px; text-align:left; font-size:13px; line-height:1.35;
            font-weight:500; }
  .sample span { display:block; color:#5f6368; font-size:11px; margin-bottom:4px;
                 text-transform:uppercase; letter-spacing:.04em; }
</style>
</head>
<body>
<header>
  <h1>Tinig sa Liwanag - Hiligaynon Translation Demo</h1>
  <span>English / Filipino / code-switched text to Hiligaynon baseline</span>
</header>

<div class="wrap">
  <div class="panes">
    <div class="pane">
      <label>Source text</label>
      <textarea id="src" placeholder="Type English, Filipino, or code-switched text..." autofocus></textarea>
    </div>
    <div class="pane">
      <label>Hiligaynon output</label>
      <div id="out"><span class="ph">translation appears here</span></div>
    </div>
  </div>
</div>

<div class="bar">
  <button id="go">Translate</button>
  <span class="hint" id="hint">Baseline demo. Ctrl/Cmd+Enter to translate. <span class="star">*word*</span> = not in the dictionary backend.</span>
</div>

<div class="samples" id="samples"></div>

<script>
const src = document.getElementById('src');
const out = document.getElementById('out');
const go  = document.getElementById('go');
const samples = document.getElementById('samples');

const samplePrompts = [
  ['Health', 'Please call the doctor if the child has a fever tonight.'],
  ['Education', 'The class was cancelled because the rain was strong, but students should read the module at home.'],
  ['Emergency', 'Do not cross the bridge because the water is rising quickly.'],
  ['Code-switching', 'Kung nahihilo ka, sit down anay and drink water.'],
  ['Public service', 'If you cannot read the form, ask the staff for help.'],
  ['Daily life', 'I left the key on the table, not inside the bag.']
];

async function translate() {
  const text = src.value.trim();
  if (!text) { out.innerHTML = '<span class="ph">type something on the left</span>'; return; }
  go.disabled = true;
  out.innerHTML = '<span class="ph">translating...</span>';
  try {
    const r = await fetch('/api/translate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text })
    });
    const data = await r.json();
    out.textContent = data.translation || data.error || '(no output)';
  } catch (e) {
    out.textContent = 'error: ' + e;
  } finally {
    go.disabled = false;
  }
}

go.addEventListener('click', translate);
src.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') translate();
});

for (const [label, text] of samplePrompts) {
  const button = document.createElement('button');
  button.className = 'sample';
  button.innerHTML = `<span>${label}</span>${text}`;
  button.addEventListener('click', () => {
    src.value = text;
    translate();
  });
  samples.appendChild(button);
}
</script>
</body>
</html>
